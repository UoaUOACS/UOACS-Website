# fly.toml app configuration file generated for uoacs-website on 2026-01-13T21:00:50+13:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'uoacs-website'
primary_region = 'syd'
swap_size_mb = 256

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 25
    soft_limit = 20

[checks]
  [checks.alive]
    grace_period = '30s'
    interval = '15s'
    method = 'GET'
    path = '/api/health'
    protocol = 'http'
    timeout = '10s'

[[vm]]
  memory = '512mb'
  cpus = 1
  cpu_kind = 'shared'
