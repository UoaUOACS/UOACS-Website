name: CI Pipeline

on:
  push:
    branches: [main, release/*]
  pull_request:
  workflow_dispatch:

jobs:
  pr-stack:
    name: PR Stack Check
    runs-on: ubuntu-latest
    outputs:
      skip_ci: ${{ steps.check.outputs.skip_ci }}
    steps:
      - name: Check if CI should run
        id: check
        continue-on-error: true
        run: |
          RESPONSE=$(curl -s -X POST https://pr-stack.fly.dev/ci-check \
            -H "Content-Type: application/json" \
            -d '${{ toJson(github.event) }}')
          echo "Response: $RESPONSE"
          SKIP_CI=$(echo "$RESPONSE" | jq -r '.skipCI')
          echo "skip_ci=$SKIP_CI" >> $GITHUB_OUTPUT

  lint:
    name: Linting
    runs-on: ubuntu-latest
    needs: [pr-stack]
    if: needs.pr-stack.outputs.skip_ci != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Biome
        uses: biomejs/setup-biome@v2

      - name: Run Biome
        run: biome ci . --error-on-warnings

  setup:
    name: Setup
    needs: [lint, pr-stack]
    runs-on: ubuntu-latest
    if: needs.pr-stack.outputs.skip_ci != 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Check if node_modules cache exists
        id: cache-check
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('**/pnpm-lock.yaml') }}
          lookup-only: true

      - name: Setup Node.js
        if: steps.cache-check.outputs.cache-hit != 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Setup pnpm
        if: steps.cache-check.outputs.cache-hit != 'true'
        uses: pnpm/action-setup@v2
        with:
          version: latest
          run_install: false

      - name: Install dependencies
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Save node_modules cache
        if: steps.cache-check.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('**/pnpm-lock.yaml') }}

  type-check:
    name: Type Checking
    runs-on: ubuntu-latest
    needs: [lint, setup]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest
          run_install: false

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        id: cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-node_modules
      
      - name: Install dependencies if cache misses
        if: steps.cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile --ignore-scripts
      
      - name: Run Type Check
        run: pnpm types:check

  build-app:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [lint, setup, type-check]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest
          run_install: false

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        id: cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-node_modules

      - name: Install dependencies if cache misses
        if: steps.cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile --ignore-scripts
        shell: bash

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('apps/*') }}
          restore-keys: |
            ${{ runner.os }}-nextjs

      - name: Build Application
        env:
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          DATABASE_URI: ${{ secrets.DATABASE_URI }}
          NEXT_PUBLIC_URL: ${{ vars.NEXT_PUBLIC_URL }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: pnpm build

  build-storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    needs: [lint, setup, type-check]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest
          run_install: false

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        id: cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node_modules

      - name: Install dependencies if cache misses
        if: steps.cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build Storybook
        shell: bash
        run: pnpm storybook:build