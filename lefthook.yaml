post-merge:
  commands:
    pnpm:
      glob: "{package.json,pnpm-lock.yaml}"
      run: pnpm install

pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}"
      exclude:
        - "pnpm-lock.yaml"
        - "**/importMap.js"
        - "**/payload-types.ts"
        - "**/*.md"
        - "**/.github/"
        - "**/.next"
        - "**/dist"
        - "**/.turbo"
        - "**/.vscode"
        - "**/coverage"
        - "**/.vercel"
        - "**/node_modules"
      run: |
        pnpm biome check --write --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {staged_files}
      stage_fixed: true

post-checkout:
  commands:
    pnpm:
      glob: "{package.json,pnpm-lock.yaml}"
      run: pnpm install